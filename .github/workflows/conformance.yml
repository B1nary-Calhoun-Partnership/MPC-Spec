name: conformance

on:
  pull_request:
    paths:
      - "conformance/**"
      - ".github/workflows/conformance.yml"
      - "**/*.md"  # spec text PRs touch the contract surface
  push:
    branches: [main]
  schedule:
    # Nightly canary so vector drift is caught even without PR traffic.
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-runner:
    name: Python cbor2 (Phase 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: conformance/runner-python/requirements.txt

      - name: Install runner deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r conformance/runner-python/requirements.txt

      - name: Run conformance vectors
        run: python conformance/runner-python/runner.py

